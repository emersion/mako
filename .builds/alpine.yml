image: alpine/edge
packages:
  - elogind-dev
  - meson
  - wayland-dev
  - wayland-protocols
  - cairo-dev
  - pango-dev
  - scdoc
sources:
  - https://github.com/emersion/mako
  - https://gitlab.freedesktop.org/emersion/keulim.git
tasks:
  - keulim: |
      cd keulim
      meson setup build/
      ninja -C build/
      sudo ninja -C build/ install
  - setup: |
      cd mako
      meson build/ -Dauto_features=enabled -Dsd-bus-provider=libelogind
  - build: |
      cd mako
      ninja -C build/

image: freebsd/latest
packages:
  - basu
  - evdev-proto
  - libepoll-shim
  - meson
  - pango
  - pkgconf
  - scdoc
  - wayland
  - wayland-protocols
sources:
  - https://github.com/emersion/mako
  - https://gitlab.freedesktop.org/emersion/keulim.git
tasks:
  - keulim: |
      cd keulim
      meson setup build/
      ninja -C build/
      sudo ninja -C build/ install
  - setup: |
      cd mako
      meson build/ -Dauto_features=enabled -Dsd-bus-provider=basu
  - build: |
      cd mako
      ninja -C build/
